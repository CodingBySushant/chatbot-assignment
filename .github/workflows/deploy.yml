name: Build and Deploy RAG Chatbot

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: prime-moment-495607-j9
  REGION:     asia-south1
  SERVICE:    rag-chatbot-assignment
  REGISTRY:   asia-south1-docker.pkg.dev

jobs:

  # Job 1: Lint
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check . --ignore E501,E401,E701,F401,F403,F541

  # Job 2: Build & Push Docker image
  build:
    name: Build & Push Docker Image
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/rag-chatbot/${{ env.SERVICE }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/rag-chatbot/${{ env.SERVICE }}:${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/rag-chatbot/${{ env.SERVICE }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/rag-chatbot/${{ env.SERVICE }}:${{ github.sha }}

  # Job 3: Deploy to Cloud Run (main branch only)
  deploy:
    name: Deploy to Cloud Run
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/rag-chatbot/${{ env.SERVICE }}:latest \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 2 \
            --port 8000 \
            --timeout 300 \
            --set-env-vars "GROQ_API_KEY=${GROQ_API_KEY},QDRANT_URL=${QDRANT_URL},QDRANT_API_KEY=${QDRANT_API_KEY},COLLECTION_NAME=rag_corpus,EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2,RERANKER_MODEL=cross-encoder/ms-marco-MiniLM-L-6-v2,LLM_MODEL=llama-3.3-70b-versatile,CHUNK_SIZE=800,CHUNK_OVERLAP=150,TOP_K_RETRIEVE=10,TOP_K_RERANK=3"

      - name: Print live URL
        run: |
          echo "=========================================="
          echo "LIVE URL:"
          gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)"
          echo "=========================================="